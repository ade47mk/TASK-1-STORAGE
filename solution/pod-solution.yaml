apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  labels:
    app: storage-demo
spec:
  containers:
  - name: app-container
    image: nginx:alpine
    volumeMounts:
    - name: app-storage
      mountPath: /data
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo $(date) >> /data/log.txt; sleep 5; done"]
  volumes:
  - name: app-storage
    persistentVolumeClaim:
      claimName: app-storage-pvc
